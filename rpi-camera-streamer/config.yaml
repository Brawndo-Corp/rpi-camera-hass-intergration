name: "RPi Camera Streamer (Full Access)"
version: "1.0.1"
panel_icon: "mdi:cctv"
panel_title: RPi Camera Streamer
slug: "rpi-camera-streamer"
description: "High-performance CSI/USB camera streamer, optimized for RPi 5 and IMX500."
url: "https://github.com/Brawndo-Corp/rpi-camera-haos-app"
# image: ghcr.io/Brawndo-Corp/rpi-camera-haos-app
startup: application
boot: auto
init: false
full_access: true
protected: false  
host_network: true
host_ipc: true
video: true
devices:
  - /dev/dma_heap:/dev/dma_heap
  - /dev/v4l-subdev0:/dev/v4l-subdev0
  - /dev/v4l-subdev1:/dev/v4l-subdev1
  - /dev/v4l-subdev2:/dev/v4l-subdev2
  - /dev/media0:/dev/media0
  - /dev/media1:/dev/media1
  - /dev/media2:/dev/media2
  - /dev/media3:/dev/media3
options:
  camera_path: "0"
  resolution: "2028x1520"
  framerate: 30
  bitrate: 25000000
  h264_profile: "high"
privileged:
  - PERFMON
  - SYS_RAWIO
schema:
  camera_path: str
  resolution: list(4056x3040|2028x1520|1920x1080|1280x720)
  framerate: int
  bitrate: int
  h264_profile: list(baseline|main|high)
arch:
  - aarch64
